<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yuen Yuen's Weather</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./asset/yuen_yuen_icon.png?v=20260310" />
    <link rel="icon" type="image/png" sizes="16x16" href="./asset/yuen_yuen_icon.png?v=20260310" />
    <link rel="shortcut icon" href="./asset/yuen_yuen_icon.png?v=20260310" />
    <link rel="apple-touch-icon" sizes="180x180" href="./asset/yuen_yuen_icon.png?v=20260310" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Sora:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero-header" aria-label="Yuen Yuen Weather Banner">
      <div class="hero-topbar">
        <div class="brand">
          <button id="homeBtn" type="button" class="brand-home" title="Back to weather cards" aria-label="Back to weather cards">
            <img class="brand-icon" src="./asset/yuen_yuen_icon.png" alt="Yuen Yuen icon" />
          </button>
          <div>
            <p class="eyebrow">Yuen Yuen Weather</p>
          </div>
        </div>
        <div class="topbar-actions">
          <button id="addLocationBtn" type="button" class="icon-btn" title="Add location" aria-label="Add location">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5v14M5 12h14" />
            </svg>
          </button>
          <button id="refreshAllBtn" type="button" class="icon-btn" title="Refresh locations" aria-label="Refresh locations">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 12a8 8 0 1 1-2.35-5.65M20 4v4h-4" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main>
      <section id="overviewPage" class="page overview-page">
        <p id="statusText" class="status status-hidden" aria-live="polite"></p>
        <div id="locationGrid" class="location-grid" aria-live="polite"></div>
      </section>

      <section id="detailPage" class="page detail-page is-hidden">
        <div class="detail-top">
          <div class="detail-summary">
            <h2 id="selectedLocationName">-</h2>
            <p id="selectedUpdated" class="muted">-</p>
          </div>
          <div class="detail-condition-badge" aria-hidden="true">
            <img
              id="detailConditionIcon"
              class="detail-condition-icon"
              src="./asset/weather-icons-set2/svg/weather_icon_set2_16.svg"
              alt="Current weather"
            />
          </div>
        </div>

        <section class="panel metrics-panel">
          <div class="metrics-grid">
            <article>
              <h3>Condition</h3>
              <p id="dailyCondition">-</p>
            </article>
            <article>
              <h3>Temperature</h3>
              <p id="dailyTemp">-</p>
            </article>
            <article>
              <h3>Low / High</h3>
              <p id="dailyLowHigh">-</p>
            </article>
            <article>
              <h3>Wind</h3>
              <p id="dailyWind">-</p>
            </article>
            <article>
              <h3>Benchmark Score</h3>
              <p id="benchmarkScore">-</p>
            </article>
            <article>
              <h3>Top Source</h3>
              <p id="benchmarkSource">-</p>
            </article>
          </div>
        </section>

        <section class="panel next7-panel">
          <div class="panel-head">
            <h3>Next 7 Days Forecast</h3>
            <p id="next7Meta" class="muted">-</p>
          </div>
          <div id="next7Grid" class="next7-grid"></div>
        </section>

        <section class="panel sports-panel">
          <div class="panel-head">
            <h3>Sport Activity Recommendation</h3>
            <p id="sportHint" class="muted">Based on local suitability data</p>
          </div>
          <div id="sportGrid" class="sport-grid"></div>
        </section>

        <section class="panel mwis-panel">
          <div class="panel-head">
            <h3>MWIS PDF</h3>
            <p id="mwisMeta" class="muted">-</p>
          </div>
          <div id="mwisLinks" class="mwis-links"></div>
        </section>

        <section class="panel history-panel">
          <div class="panel-head history-head">
            <h3>Historical Trend</h3>
            <div class="history-head-side">
              <div class="history-toggle" role="group" aria-label="Trend metric">
                <button id="historyMetricTempBtn" type="button" class="history-toggle-btn is-active" aria-pressed="true">Temp</button>
                <button id="historyMetricWindBtn" type="button" class="history-toggle-btn" aria-pressed="false">Wind</button>
              </div>
              <p id="historyMeta" class="muted">-</p>
            </div>
          </div>
          <div id="historyChart" class="history-chart"></div>
          <div id="historyLegend" class="history-legend"></div>
        </section>

        <section class="panel benchmark-panel">
          <div class="panel-head">
            <h3>Benchmark Sources</h3>
            <p id="benchmarkDelta" class="muted">-</p>
          </div>
          <div id="benchmarkList" class="benchmark-list"></div>
        </section>
      </section>
    </main>
  </body>
  <script type="module" src="./app.js"></script>
</html>
