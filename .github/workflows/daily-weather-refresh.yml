name: Daily Weather Data Refresh

on:
  schedule:
    # 08:00 Europe/London year-round (07:00 UTC in BST, 08:00 UTC in GMT)
    - cron: "0 7,8 * * *"
  workflow_dispatch:
    inputs:
      aibot_ref:
        description: "AIBot git ref (branch/tag/commit)"
        required: false
        default: "main"

permissions:
  contents: read

concurrency:
  group: daily-weather-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Time gate (08:00 Europe/London)
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          event = os.getenv("EVENT_NAME", "")
          now = datetime.now(ZoneInfo("Europe/London"))
          should_run = event != "schedule" or now.hour == 8

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fp:
              fp.write(f"run={'true' if should_run else 'false'}\n")
              fp.write(f"london_now={now.isoformat()}\n")

          print(f"Event={event} London time={now.isoformat()} should_run={should_run}")
          PY

      - name: Checkout website repository
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout AIBot repository
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: FelixLee888/AIBot
          ref: ${{ github.event.inputs.aibot_ref || 'main' }}
          path: aibot
          fetch-depth: 1

      - name: Setup Node.js
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        if: steps.gate.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Validate Google Sheets credentials
        if: steps.gate.outputs.run == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "${GOOGLE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "Missing secret GOOGLE_SERVICE_ACCOUNT_JSON"
            exit 1
          fi

      - name: Crawl weather, refresh snapshots, and write to Google Sheet
        if: steps.gate.outputs.run == 'true'
        run: |
          node scripts/refresh-weather-data.mjs --mode full
        env:
          AIBOT_SCRIPT_PATH: aibot/scripts/weather_mountains_briefing.py
          WEATHER_SITE_REPO_PATH: ${{ github.workspace }}
          WEATHER_SITE_DATA_SUBDIR: public/data
          WEATHER_SITE_GIT_REMOTE: origin
          WEATHER_SITE_GIT_BRANCH: main
          WEATHER_SITE_SYNC_ENABLED: '1'
          WEATHER_SITE_GIT_PUSH_ENABLED: '0'
          WEATHER_BENCHMARK_DATA_DIR: ${{ github.workspace }}/.weather-benchmark-data
          WEATHER_GOOGLE_SHEET_DIRECT_WRITE: '1'
          WEATHER_GOOGLE_SHEET_ID: 1g9_1I1xyt7iO922yNXckPswnqV5ATIzLo3NQ6IJ4O5k
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
