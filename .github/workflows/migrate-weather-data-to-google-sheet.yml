name: Migrate Weather JSON To Google Sheet

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Google Sheets credentials
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "${GOOGLE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "Missing secret GOOGLE_SERVICE_ACCOUNT_JSON"
            exit 1
          fi

      - name: Import existing JSON snapshots into Google Sheet DB
        run: |
          if [ ! -f public/data/weather_latest_report.json ] || [ ! -f public/data/weather_benchmarks_latest.json ] || [ ! -f public/data/weather_history_recent.json ]; then
            echo "No local weather snapshot JSON files found; skipping migration."
            exit 0
          fi
          node scripts/google-sheet-weather-db.mjs import-from-json --spreadsheet-id 1g9_1I1xyt7iO922yNXckPswnqV5ATIzLo3NQ6IJ4O5k
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Verify migration integrity
        run: |
          node scripts/google-sheet-weather-db.mjs verify-roundtrip --spreadsheet-id 1g9_1I1xyt7iO922yNXckPswnqV5ATIzLo3NQ6IJ4O5k
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
